<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Komedi Dev #7 - Horor Git Conflict</title>
    <style>
        :root {
            --git-orange: #f05032;
            --bg-dark: #0d1117;
            --error-red: #da3633;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Segoe UI', sans-serif;
            background: #f6f8fa;
            overflow: hidden;
        }

        /* --- FASE 1: KOMIK (MODIFIKASI HAKI) --- */
        #comic-page-7 {
            display: flex;
            height: 100vh;
            padding: 10px;
            gap: 10px;
            box-sizing: border-box;
            transition: transform 0.8s ease-in-out;
        }

        .panel {
            flex: 1;
            background: white;
            border: 4px solid #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 15px;
            position: relative;
        }

        .git-icon { font-size: 60px; color: var(--git-orange); margin-bottom: 15px; }
        .speech { font-weight: bold; font-size: 1rem; color: #24292f; }

        #btn-terminal {
            position: absolute;
            bottom: 20px;
            background: var(--git-orange);
            color: white;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 0 4px 0 #b03a25;
        }

        /* --- FASE 2: TERMINAL GIT FULL PAGE --- */
        #git-terminal-page {
            position: fixed;
            top: 100vh;
            left: 0;
            width: 100vw; height: 100vh;
            background: var(--bg-dark);
            color: #c9d1d9;
            padding: 40px;
            box-sizing: border-box;
            font-family: 'Consolas', monospace;
            transition: top 0.8s cubic-bezier(0.7, 0, 0.3, 1);
        }

        .log-line { margin-bottom: 5px; }
        .err { color: var(--error-red); font-weight: bold; }
        .warn { color: #e3b341; }
        .success { color: #3fb950; }

        #force-btn {
            display: none;
            margin-top: 30px;
            background: var(--error-red);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        body.switching #comic-page-7 { transform: translateY(-100vh); }
        body.switching #git-terminal-page { top: 0; }
    </style>
</head>
<body>

    <div id="comic-page-7">
        <div class="panel">
            <div class="git-icon">📦</div>
            <div class="speech">"Kodingan mantap, siap push ke main!"</div>
        </div>
        <div class="panel">
            <div class="git-icon" style="filter: grayscale(1);">⚠️</div>
            <div class="speech">"LHO?! Ada 150 Conflict dari rekan tim?!"</div>
        </div>
        <div class="panel">
            <div class="git-icon">🔥</div>
            <div class="speech">"Malas benerin conflict... PAKSA SAJA!"</div>
            <button id="btn-terminal">BUKA TERMINAL BAHAYA</button>
        </div>
    </div>

    <div id="git-terminal-page">
        <div id="terminal-content">
            <div class="log-line">$ git commit -m "Beresin fitur login"</div>
            <div class="log-line">[main b1a2c3d] Beresin fitur login</div>
            <div class="log-line">$ git push origin main</div>
        </div>
        <button id="force-btn">PUSH --FORCE (BISMILLAH)</button>
    </div>

    <script>
        const btnTerm = document.getElementById('btn-terminal');
        const content = document.getElementById('terminal-content');
        const forceBtn = document.getElementById('force-btn');

        btnTerm.addEventListener('click', () => {
            document.body.classList.add('switching');
            setTimeout(runGitDrama, 1000);
        });

        function addLine(txt, cls="") {
            const div = document.createElement('div');
            div.className = 'log-line ' + cls;
            div.innerHTML = txt;
            content.appendChild(div);
            window.scrollTo(0, document.body.scrollHeight);
        }

        function runGitDrama() {
            const logs = [
                { t: "To https://github.com/bos-cak/proyek-rahasia.git", c: "" },
                { t: "! [rejected] main -> main (non-fast-forward)", c: "err" },
                { t: "error: failed to push some refs to 'https://github.com/...'", c: "err" },
                { t: "hint: Updates were rejected because the tip of your current branch is behind", c: "warn" },
                { t: "hint: its remote counterpart. Integrate the remote changes...", c: "warn" },
                { t: "<br>KRITIS: Teman kantor kamu baru saja merubah 5,000 baris kode.", c: "err" },
                { t: "Pilihan: <br>1. Git Pull (Pusing benerin conflict)<br>2. Nangis di pojokan<br>3. Hancurkan dunia (Force Push)", c: "" }
            ];

            let i = 0;
            function print() {
                if (i < logs.length) {
                    addLine(logs[i].t, logs[i].c);
                    i++;
                    setTimeout(print, 600);
                } else {
                    forceBtn.style.display = "block";
                }
            }
            print();
        }

        forceBtn.addEventListener('click', () => {
            forceBtn.style.display = "none";
            addLine("<br>$ git push origin main --force", "warn");
            setTimeout(() => {
                addLine("Everything up-to-date", "success");
                addLine("<br>CATATAN: Kamu baru saja menghapus kerjaan temanmu sebulan. <br>Hati-hati besok di kantor.", "err");
            }, 1000);
        });
    </script>
</body>
</html>
