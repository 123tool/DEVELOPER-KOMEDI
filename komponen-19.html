<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Komedi Dev #19 - Mode Kelelawar</title>
    <style>
        :root {
            --day-bg: #f1f2f6;
            --night-bg: #0b0e14;
            --accent: #f1c40f;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Segoe UI', sans-serif;
            transition: background 0.5s ease;
            overflow: hidden;
        }

        /* --- FASE 1: KOMIK --- */
        #comic-page-19 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            height: 100vh;
            padding: 10px;
            gap: 10px;
            box-sizing: border-box;
            background: var(--day-bg);
            transition: transform 0.8s ease-in-out;
        }

        .panel {
            background: white;
            border: 4px solid #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .time-label { font-weight: 900; color: #666; margin-bottom: 10px; }
        .emoji { font-size: 60px; }

        #btn-night-mode {
            grid-column: span 3;
            background: #000;
            color: #fff;
            padding: 15px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* --- FASE 2: PRODUCTIVITY SIMULATOR --- */
        #night-sim-page {
            position: fixed;
            top: 100vh;
            left: 0;
            width: 100vw; height: 100vh;
            background: var(--day-bg);
            transition: top 0.8s cubic-bezier(0.7, 0, 0.3, 1), background 0.5s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .slider-container {
            width: 300px;
            margin-bottom: 50px;
            text-align: center;
            z-index: 10;
        }

        #time-slider { width: 100%; cursor: pointer; }

        .editor-box {
            width: 80%;
            max-width: 600px;
            height: 200px;
            background: #fff;
            border: 2px solid #000;
            padding: 20px;
            font-family: monospace;
            overflow: hidden;
            box-shadow: 10px 10px 0 #000;
            position: relative;
        }

        .dark-editor {
            background: #1e1e1e !important;
            color: #55efc4 !important;
            border-color: var(--accent) !important;
        }

        .power-effect {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            box-shadow: inset 0 0 50px rgba(241, 196, 15, 0);
            transition: box-shadow 0.3s;
        }

        body.switching #comic-page-19 { transform: translateY(-100vh); }
        body.switching #night-sim-page { top: 0; }
    </style>
</head>
<body>

    <div id="comic-page-19">
        <div class="panel">
            <div class="time-label">10:00 AM</div>
            <div class="emoji">💤</div>
            <p>"Ngetik satu variabel aja butuh waktu 15 menit."</p>
        </div>
        <div class="panel">
            <div class="time-label">02:00 PM</div>
            <div class="emoji">🫠</div>
            <p>"Energi habis buat dengerin ocehan klien di Zoom."</p>
        </div>
        <div class="panel" style="background: #2d3436; color: white;">
            <div class="time-label" style="color: #f1c40f;">02:00 AM</div>
            <div class="emoji">🧛‍♂️</div>
            <p>"KESURUPAN JIN KODING. Website 100jt kelar semalam!"</p>
        </div>
        <button id="btn-night-mode">MASUK KE JAM KERJA DEVELOPER 🧛‍♂️</button>
    </div>

    <div id="night-sim-page">
        <div class="slider-container">
            <h2 id="time-display">Waktu: 12:00 (Siang)</h2>
            <input type="range" id="time-slider" min="0" max="23" value="12">
            <p id="mood-label">Status: Malas & Ngantuk</p>
        </div>

        <div class="editor-box" id="editor">
            <div class="power-effect" id="power"></div>
            <div id="code-content">Mencoba menulis kode...</div>
        </div>
    </div>

    <script>
        const btn = document.getElementById('btn-night-mode');
        const slider = document.getElementById('time-slider');
        const timeDisp = document.getElementById('time-display');
        const moodLabel = document.getElementById('mood-label');
        const page = document.getElementById('night-sim-page');
        const editor = document.getElementById('editor');
        const power = document.getElementById('power');
        const code = document.getElementById('code-content');

        btn.addEventListener('click', () => {
            document.body.classList.add('switching');
        });

        slider.addEventListener('input', () => {
            const h = parseInt(slider.value);
            timeDisp.textContent = `Waktu: ${h.toString().padStart(2, '0')}:00`;
            
            if (h >= 18 || h <= 5) {
                // MODE MALAM (PRODUKTIF)
                page.style.background = "#0b0e14";
                page.style.color = "#fff";
                editor.classList.add('dark-editor');
                moodLabel.textContent = "Status: MODE DEWA KODING AKTIF! ⚡";
                moodLabel.style.color = "#f1c40f";
                power.style.boxShadow = "inset 0 0 50px rgba(241, 196, 15, 0.5)";
                code.innerHTML = "function autoCuan() { <br> &nbsp;&nbsp;return 'Project Selesai 100%'; <br> } <br> // KODE BERJALAN DENGAN KECEPATAN CAHAYA";
            } else {
                // MODE SIANG (LEMAH)
                page.style.background = "#f1f2f6";
                page.style.color = "#000";
                editor.classList.remove('dark-editor');
                moodLabel.textContent = "Status: Malas & Ngantuk (Butuh Kopi)";
                moodLabel.style.color = "#666";
                power.style.boxShadow = "none";
                code.innerHTML = "f... u... n... c... t... i... o... n... <br> (Error: Otak butuh istirahat)";
            }
        });
    </script>
</body>
</html>
