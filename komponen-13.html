<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Komedi Dev #13 - Frontend vs Backend</title>
    <style>
        :root {
            --frontend-ui: #00d2ff;
            --backend-mess: #2c3e50;
            --danger: #e74c3c;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Segoe UI', sans-serif;
            background: #f1f2f6;
            overflow: hidden;
        }

        /* --- FASE 1: KOMIK --- */
        #comic-page-13 {
            display: grid;
            grid-template-rows: 1fr 1fr;
            height: 100vh;
            gap: 10px;
            padding: 10px;
            box-sizing: border-box;
            transition: transform 0.8s ease-in-out;
        }

        .panel {
            background: white;
            border: 4px solid #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .label {
            position: absolute;
            top: 10px; left: 10px;
            background: #000; color: #fff;
            padding: 5px 15px; font-weight: 900;
        }

        .visual-fe { font-size: 80px; filter: drop-shadow(0 0 10px var(--frontend-ui)); }
        .visual-be { font-size: 80px; filter: grayscale(1); }

        #btn-peek {
            position: absolute;
            bottom: 20px;
            background: var(--danger);
            color: white; border: none;
            padding: 15px 30px; font-weight: bold;
            cursor: pointer; border-radius: 50px;
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }

        /* --- FASE 2: THE SPAGHETTI REVEAL --- */
        #reveal-page {
            position: fixed;
            top: 100vh;
            left: 0;
            width: 100vw; height: 100vh;
            background: var(--backend-mess);
            color: #fff;
            transition: top 0.8s cubic-bezier(0.7, 0, 0.3, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .spaghetti-wire {
            position: absolute;
            width: 2px; background: var(--danger);
            opacity: 0.5;
            z-index: 1;
        }

        .server-core {
            width: 200px; height: 200px;
            background: #000; border: 4px solid var(--danger);
            display: flex; align-items: center; justify-content: center;
            font-family: monospace; z-index: 10;
            text-align: center; padding: 20px;
            animation: shake 0.1s infinite;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -2px); }
            100% { transform: translate(1px, 2px); }
        }

        body.switching #comic-page-13 { transform: translateY(-100vh); }
        body.switching #reveal-page { top: 0; }
    </style>
</head>
<body>

    <div id="comic-page-13">
        <div class="panel">
            <div class="label">FRONTEND</div>
            <div class="visual-fe">🦢✨</div>
            <p style="margin-top: 20px; font-weight: bold;">"Anggun, tenang, dan estetik."</p>
        </div>
        <div class="panel" style="background: #e0e0e0;">
            <div class="label">BACKEND</div>
            <div class="visual-be">⚙️🔥🔧</div>
            <p style="margin-top: 20px; font-weight: bold;">"Penuh luka, kabel semrawut, hampir meledak."</p>
            <button id="btn-peek">LIHAT LOGIKA DALEMNYA 👁️</button>
        </div>
    </div>

    <div id="reveal-page">
        <div class="server-core">
            ERROR 502<br>Tapi Data Tetap Masuk<br>Bismillah
        </div>
        <div id="wire-container"></div>
        <p style="position: absolute; bottom: 40px; color: var(--danger); font-family: monospace;">
            [*] Menghubungkan database pake kawat jemuran...<br>
            [*] Menambal bug pake selotip...<br>
            [*] Status: BERHASIL (Gak tau kenapa)
        </p>
    </div>

    <script>
        const btn = document.getElementById('btn-peek');
        const wireContainer = document.getElementById('wire-container');

        btn.addEventListener('click', () => {
            document.body.classList.add('switching');
            createSpaghetti();
        });

        function createSpaghetti() {
            for (let i = 0; i < 50; i++) {
                const wire = document.createElement('div');
                wire.className = 'spaghetti-wire';
                wire.style.left = Math.random() * 100 + 'vw';
                wire.style.top = Math.random() * 100 + 'vh';
                wire.style.height = Math.random() * 500 + 'px';
                wire.style.transform = `rotate(${Math.random() * 360}deg)`;
                wire.style.background = i % 2 === 0 ? '#e74c3c' : '#f1c40f';
                wireContainer.appendChild(wire);
            }
        }
    </script>
</body>
</html>
