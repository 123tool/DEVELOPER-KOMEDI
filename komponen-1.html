<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Komik Dev Interaktif - Komponen 1</title>
    <style>
        :root {
            --npm-red: #cb3837;
            --terminal-bg: #0d1117;
            --text-dark: #1a1a1a;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background-color: #f4f4f4;
        }

        /* --- FASE 1: HALAMAN KOMIK (FULL PAGE) --- */
        #comic-page {
            display: grid;
            grid-template-rows: 1fr 1fr 1.2fr;
            height: 100vh;
            width: 100vw;
            gap: 10px;
            padding: 10px;
            box-sizing: border-box;
            transition: transform 0.8s cubic-bezier(0.7, 0, 0.3, 1);
        }

        .panel {
            background: white;
            border: 4px solid var(--text-dark);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Panel 1 */
        .speech {
            position: absolute;
            top: 15%;
            right: 10%;
            background: white;
            border: 2px solid #000;
            padding: 10px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.2rem;
            z-index: 2;
        }

        #enter-btn {
            background: var(--npm-red);
            color: white;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            display: inline-block;
            box-shadow: 0 4px 0 #8a2625;
        }

        #enter-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #8a2625; }

        /* Panel 2 & 3 Visual (Simplified CSS Art) */
        .wave-text {
            position: absolute;
            right: -100%;
            background: #000;
            color: #fff;
            width: 80%;
            height: 100%;
            display: flex;
            align-items: center;
            padding-left: 50px;
            font-size: 3rem;
            font-weight: 900;
            transform: skewX(-15deg);
            transition: right 1s ease-in;
        }

        .space-bg {
            background: #000;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            opacity: 0;
            transition: opacity 1s;
        }

        /* --- FASE 2: TERMINAL (FULL PAGE) --- */
        #terminal-page {
            position: fixed;
            top: 100vh; /* Sembunyi di bawah */
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--terminal-bg);
            color: #c9d1d9;
            font-family: 'Consolas', 'Monaco', monospace;
            padding: 30px;
            box-sizing: border-box;
            transition: top 0.8s cubic-bezier(0.7, 0, 0.3, 1);
            overflow-y: auto;
        }

        /* Animasi Transisi */
        body.switching #comic-page { transform: translateY(-100vh); }
        body.switching #terminal-page { top: 0; }

        .cursor { display: inline-block; width: 10px; height: 18px; background: #58a6ff; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        .blue { color: #58a6ff; }
        .green { color: #3fb950; }
        .red { color: #f85149; }
    </style>
</head>
<body>

    <div id="comic-page">
        <div class="panel">
            <div class="speech">Jadi, npm instal... daaan... <div id="enter-btn">ENTER!</div></div>
            <div style="font-size: 80px;">(°^°)💻</div>
        </div>
        <div class="panel" id="panel2">
            <div style="font-size: 60px; margin-right: 100px;">(°O°)</div>
            <div class="wave-text" id="wave">KETERGANTUNGAN</div>
        </div>
        <div class="panel" id="panel3">
            <div class="space-bg" id="space">
                <div style="font-size: 50px;">(×_×)</div>
                <div style="margin-top: 10px; border-bottom: 2px solid white;">Keter...</div>
                <div style="font-size: 80px; margin-top: 20px;">🌎</div>
                <p style="margin-top: 20px;">Tenggelam dalam node_modules...</p>
            </div>
        </div>
    </div>

    <div id="terminal-page" id="terminal">
        <div id="terminal-content"></div>
        <span class="cursor"></span>
    </div>

    <script>
        const enterBtn = document.getElementById('enter-btn');
        const wave = document.getElementById('wave');
        const space = document.getElementById('space');
        const content = document.getElementById('terminal-content');

        enterBtn.addEventListener('click', () => {
            // 1. Jalankan animasi di komik dulu sebentar
            wave.style.right = "-10%";
            
            setTimeout(() => {
                space.style.opacity = "1";
            }, 800);

            // 2. Transisi ke Terminal Penuh
            setTimeout(() => {
                document.body.classList.add('switching');
                startTerminal();
            }, 2500);
        });

        function startTerminal() {
            const lines = [
                "<span class='blue'>caker@studio:~/proyek$</span> npm instal lodash react-fullstack express-oke",
                "<br>> Memulai pengunduhan paket...",
                "> Menghubungkan ke registry.npmjs.org...",
                "<span class='green'>✔ Terhubung!</span>",
                "<br>> [1/4] Mengunduh lodash@4.17.21...",
                "> [2/4] Mengunduh react-fullstack@18.2.0...",
                "> [3/4] Mengunduh ketergantungan transitif (4,500 paket)...",
                "> <span class='red'>PERINGATAN: Memori sistem hampir habis.</span>",
                "> Menambahkan 12,890 paket dari 892 kontributor...",
                "> Mengekstrak paket ke node_modules...",
                "<br><span class='red'>[FATAL ERROR] Ruang Disk Penuh!</span>",
                "<span class='red'>Ketergantungan terlalu berat, sistem tenggelam.</span>",
                "<br>Silakan hapus hidup Anda atau beli SSD 100TB.",
                "<br><span class='blue'>caker@studio:~/proyek$</span> <span class='cursor'></span>"
            ];

            let i = 0;
            function printLine() {
                if (i < lines.length) {
                    const div = document.createElement('div');
                    div.style.marginBottom = "8px";
                    div.innerHTML = lines[i];
                    content.appendChild(div);
                    
                    // Auto scroll
                    document.getElementById('terminal-page').scrollTop = document.getElementById('terminal-page').scrollHeight;
                    
                    i++;
                    setTimeout(printLine, 600);
                }
            }
            setTimeout(printLine, 1000);
        }
    </script>
</body>
</html>
